name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact --log-opts="$LOG_OPTS"
        env:
          LOG_OPTS: ${{ github.event_name == 'pull_request' && format('--no-merges {0}...{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || format('--no-merges {0}^...{1}', github.event.before, github.sha) }}
